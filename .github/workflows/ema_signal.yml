name: Nifty EMA Signal Alert

on:
  schedule:
    # Every 3 minutes, Mon–Fri, 9:15 AM to 3:30 PM IST (UTC 3:45 to 10:00)
    - cron: '*/3 3-10 * * 1-5'
  workflow_dispatch:

jobs:
  ema-signal:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Crucial: Grants permission to push updates back to your repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run EMA signal script
        run: python ema_signal.py

      - name: Debug file location
        run: |
          echo "Listing files in current directory:"
          ls -R

      - name: Save state back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Only attempt to commit if the file exists
          if [ -f "ema_state.json" ]; then
            git add ema_state.json
            git diff --staged --quiet || git commit -m "update ema state [skip ci]"
            git push
          else
            echo "ema_state.json not found in root. Checking subdirectories..."
            # If the file is in a subfolder, add it correctly here
            # Example: git add folder_name/ema_state.json
            echo "If file is in a subfolder, update the git add command in ema_signal.yml"
            exit 0
          fi

name: Nifty EMA Signal Alert

on:
  schedule:
    - cron: '*/3 3-10 * * 1-5'
  workflow_dispatch:

jobs:
  ema-signal:
    runs-on: ubuntu-latest
    # ADD THIS PERMISSIONS BLOCK:
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run EMA signal script
        run: python ema_signal.py

      - name: Save state back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ema_state.json
          git diff --staged --quiet || git commit -m "update ema state [skip ci]"
          git push
